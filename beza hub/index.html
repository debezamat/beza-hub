<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Beza Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--card:#fff;--border:#E4E7EC;--border2:#CBD2DA;
  --text1:#101828;--text2:#475467;--text3:#98A2B3;
  --blue50:#EFF8FF;--blue200:#B2DDFF;--blue600:#1570EF;--blue700:#175CD3;
  --green50:#ECFDF3;--green200:#A9EFC5;--green600:#079455;--green700:#067647;
  --red50:#FEF3F2;--red200:#FECDCA;--red600:#D92D20;
  --amber50:#FFFAEB;--amber200:#FEDF89;--amber600:#B54708;
  --teal50:#E1F5EE;--teal800:#085041;
  --purple50:#F4F3FF;--purple800:#3C3489;
}
body.dark{
  --bg:#0F172A;--card:#1E293B;--border:#334155;--border2:#475569;
  --text1:#F1F5F9;--text2:#94A3B8;--text3:#475569;
  --blue50:#1E3A5F;--blue200:#1D4ED8;--blue600:#3B82F6;--blue700:#60A5FA;
  --green50:#14532D;--green200:#166534;--green600:#4ADE80;--green700:#86EFAC;
  --red50:#450A0A;--red200:#991B1B;--red600:#FCA5A5;
  --amber50:#451A03;--amber200:#92400E;--amber600:#FCD34D;
  --teal50:#085041;--teal800:#9FE1CB;
  --purple50:#2E1065;--purple800:#C4B5FD;
}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);transition:background .2s,color .2s}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:38px;height:38px;background:var(--blue600);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-name{font-size:17px;font-weight:600;color:var(--text1)}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;color:var(--text2)}
.icon-btn:hover{border-color:var(--blue600);color:var(--blue600)}

/* LOGIN PILL */
.login-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s}
.login-pill:hover{border-color:var(--blue600);color:var(--blue600)}
.login-pill.active{background:var(--green50);border-color:var(--green200);color:var(--green700)}

/* PAGE */
.page{max-width:900px;margin:0 auto;padding:32px 20px 60px}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.section-label span{font-size:14px}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:32px}

/* APP CARD */
.app-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:default;transition:all .18s;position:relative;display:flex;flex-direction:column;gap:0}
.app-card:hover{border-color:var(--blue200);transform:translateY(-2px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lock-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.lock-btn:hover{transform:scale(1.1)}
.lock-btn.is-private{background:var(--red50);border-color:var(--red200)}
.lock-btn.is-public{background:var(--green50);border-color:var(--green200)}
.card-name{font-size:15px;font-weight:600;color:var(--text1);margin-bottom:5px}
.card-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:14px;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.cat-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.cat-prod{background:var(--blue50);color:var(--blue700)}
.cat-viagem{background:var(--teal50);color:var(--teal800)}
.cat-pessoal{background:var(--purple50);color:var(--purple800)}
.open-btn{font-size:12px;font-weight:500;color:var(--blue600);display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:7px;background:var(--blue50);border:1px solid var(--blue200);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-decoration:none;white-space:nowrap}
.open-btn:hover{background:var(--blue200)}

/* LOCKED CARD */
.locked-card{background:var(--card);border:1px dashed var(--border2);border-radius:14px;padding:24px;text-align:center}
.locked-card-icon{font-size:32px;margin-bottom:10px}
.locked-card-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px}
.locked-card-sub{font-size:13px;color:var(--text3);margin-bottom:16px}
.pw-form{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pw-input{width:130px;font-size:14px;padding:9px 12px;border:1px solid var(--border2);border-radius:9px;background:var(--card);color:var(--text1);outline:none;font-family:'Inter',sans-serif;text-align:center;letter-spacing:.15em}
.pw-input:focus{border-color:var(--blue600);box-shadow:0 0 0 3px rgba(21,112,239,.1)}
.pw-btn{padding:9px 20px;border-radius:9px;border:none;background:var(--blue600);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.pw-btn:hover{background:var(--blue700)}
.pw-error{font-size:12px;color:var(--red600);margin-top:8px;display:none}

/* LOCKED BLURRED CARDS */
.private-grid{position:relative}
.blur-overlay{position:absolute;inset:0;border-radius:14px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);pointer-events:none;z-index:2}
.card-blur{filter:blur(2px);pointer-events:none;user-select:none;opacity:.5}

/* SESSION BANNER */
.session-banner{background:var(--green50);border:1px solid var(--green200);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:24px;font-size:13px;color:var(--green700)}
.session-banner-icon{font-size:16px}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:4px 0 28px}

/* ADD CARD */
.add-card{background:transparent;border:1.5px dashed var(--border2);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;cursor:default;transition:border-color .15s}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;line-height:1.4;max-width:280px}

/* FOOTER */
.footer{text-align:center;margin-top:40px;font-size:11px;color:var(--text3)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <div class="brand-name">Beza Hub</div>
      <div class="brand-sub">André Bezamat</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="toggleDark()" id="darkBtn" title="Alternar tema">🌙</button>
    <button class="login-pill" id="loginBtn" onclick="handleLoginClick()">
      <span id="loginIcon">🔒</span>
      <span id="loginText">Entrar</span>
    </button>
  </div>
</div>

<div class="page">

  <div id="sessionBanner" style="display:none" class="session-banner">
    <span class="session-banner-icon">✅</span>
    <span>Sessão ativa — áreas privadas desbloqueadas. A sessão expira ao fechar o browser.</span>
  </div>

  <!-- SEÇÃO PÚBLICA -->
  <div class="section-label"><span>🌐</span> Público — visível para todos</div>
  <div class="cards-grid" id="publicGrid"></div>

  <div class="sep"></div>

  <!-- SEÇÃO PRIVADA -->
  <div class="section-label" id="privateLabel"><span>🔒</span> Privado — requer senha</div>
  <div id="privateSection"></div>

  <div class="footer">Beza Hub · Acesso pessoal · Dados salvos localmente</div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ================================================================
// CONFIG — adicione novos apps aqui no futuro
// ================================================================
const HASH='2aaad41b89dfad19e5668918018ae02695d7710bcbe5f2dc689234e8da492de3';
const KEY_LOCKS='beza-hub-locks';
const KEY_DARK='beza-hub-dark';
const SESSION_KEY='beza-hub-session';

// Array de apps — para adicionar novo app no futuro, só adicione um objeto aqui
const APPS=[
  {
    id:'painel',
    name:'Beza Painel',
    desc:'Tarefas, lembretes diários e rotina. Alarmes automáticos e dark mode.',
    icon:'📋',
    iconBg:'#EFF8FF',
    cat:'prod',
    catLabel:'Produtividade',
    url:'beza-tarefas.html',
    defaultPrivate:true
  },
  {
    id:'viagens',
    name:'Beza Viagens',
    desc:'Comparador de destinos, orçamento, roteiro e checklist de viagem.',
    icon:'✈️',
    iconBg:'#E1F5EE',
    cat:'viagem',
    catLabel:'Viagem',
    url:'beza-viagens.html',
    defaultPrivate:false
  }
];

// ================================================================
// STATE
// ================================================================
var isDark=localStorage.getItem(KEY_DARK)==='1';
var isLogged=sessionStorage.getItem(SESSION_KEY)==='1';
var locks={}; // {appId: true=private, false=public}

function loadLocks(){
  try{const d=localStorage.getItem(KEY_LOCKS);if(d)locks=JSON.parse(d);}catch(e){}
  // Apply defaults for apps not yet configured
  APPS.forEach(a=>{if(typeof locks[a.id]==='undefined')locks[a.id]=a.defaultPrivate;});
}
function saveLocks(){try{localStorage.setItem(KEY_LOCKS,JSON.stringify(locks));}catch(e){}}

// ================================================================
// DARK MODE
// ================================================================
function applyDark(){
  document.body.classList.toggle('dark',isDark);
  document.getElementById('darkBtn').textContent=isDark?'☀️':'🌙';
}
function toggleDark(){isDark=!isDark;localStorage.setItem(KEY_DARK,isDark?'1':'0');applyDark();}

// ================================================================
// AUTH — SHA-256 via Web Crypto API
// ================================================================
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function tryLogin(){
  const inp=document.getElementById('pwInput');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val)return;
  const h=await sha256(val);
  if(h===HASH){
    isLogged=true;
    sessionStorage.setItem(SESSION_KEY,'1');
    render();
    toast('✅ Bem-vindo, Beza!');
  } else {
    const err=document.getElementById('pwError');
    if(err){err.style.display='block';err.textContent='Senha incorreta. Tente novamente.';}
    inp.value='';inp.focus();
  }
}
function logout(){
  isLogged=false;
  sessionStorage.removeItem(SESSION_KEY);
  render();
  toast('👋 Sessão encerrada');
}
function handleLoginClick(){
  if(isLogged){if(confirm('Encerrar sessão?'))logout();}
  else{const inp=document.getElementById('pwInput');if(inp)inp.focus();}
}

// ================================================================
// LOCK TOGGLE
// ================================================================
function toggleLock(appId){
  locks[appId]=!locks[appId];
  saveLocks();
  render();
  const app=APPS.find(a=>a.id===appId);
  toast(locks[appId]?`🔒 ${app.name} agora é privado`:`🔓 ${app.name} agora é público`);
}

// ================================================================
// TOAST
// ================================================================
function toast(msg,dur=3000){
  const t=document.getElementById('toast');
  t.style.background=msg.includes('❌')?'#D92D20':'#101828';
  t.style.color='#fff';t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',dur);
}

// ================================================================
// CARD BUILDER
// ================================================================
function buildCard(app,showLockBtn){
  const isPrivate=locks[app.id];
  const lockIcon=isPrivate?'🔒':'🔓';
  const lockClass=isPrivate?'is-private':'is-public';
  const lockTitle=isPrivate?'Tornar público':'Tornar privado';
  const lockBtnHtml=showLockBtn
    ?`<button class="lock-btn ${lockClass}" onclick="toggleLock('${app.id}')" title="${lockTitle}">${lockIcon}</button>`
    :`<span class="cat-badge cat-${app.cat}">${app.catLabel}</span>`;

  return`<div class="app-card">
    <div class="card-top">
      <div class="card-icon" style="background:${app.iconBg}">${app.icon}</div>
      ${lockBtnHtml}
    </div>
    <div class="card-name">${app.name}</div>
    <div class="card-desc">${app.desc}</div>
    <div class="card-footer">
      ${showLockBtn?`<span class="cat-badge cat-${app.cat}">${app.catLabel}</span>`:''}
      <a class="open-btn" href="${app.url}" target="_blank" rel="noopener">Abrir ↗</a>
    </div>
  </div>`;
}

function buildAddCard(){
  return`<div class="add-card">
    <div style="font-size:28px;margin-bottom:8px;color:var(--border2)">+</div>
    <div style="font-size:13px;color:var(--text3);font-weight:500">Novo app em breve</div>
  </div>`;
}

// ================================================================
// RENDER
// ================================================================
function render(){
  // Update login button
  const loginBtn=document.getElementById('loginBtn');
  document.getElementById('loginIcon').textContent=isLogged?'🔓':'🔒';
  document.getElementById('loginText').textContent=isLogged?'Sair':'Entrar';
  loginBtn.classList.toggle('active',isLogged);

  // Session banner
  document.getElementById('sessionBanner').style.display=isLogged?'flex':'none';

  // Separate public and private apps
  const publicApps=APPS.filter(a=>!locks[a.id]);
  const privateApps=APPS.filter(a=>locks[a.id]);

  // Public grid — always visible, lock toggle visible when logged in
  const pubGrid=document.getElementById('publicGrid');
  if(publicApps.length===0){
    pubGrid.innerHTML=`<div style="grid-column:1/-1;padding:16px 0;font-size:13px;color:var(--text3)">Nenhum app público no momento.</div>`;
  } else {
    pubGrid.innerHTML=publicApps.map(a=>buildCard(a,isLogged)).join('')+buildAddCard();
  }

  // Private section label
  document.getElementById('privateLabel').innerHTML=isLogged
    ?'<span>🔓</span> Privado — desbloqueado'
    :'<span>🔒</span> Privado — requer senha';

  // Private section
  const privSec=document.getElementById('privateSection');
  if(!isLogged){
    // Show login form
    privSec.innerHTML=`<div class="locked-card">
      <div class="locked-card-icon">🔐</div>
      <div class="locked-card-title">Área privada</div>
      <div class="locked-card-sub">Digite sua senha para acessar</div>
      <div class="pw-form">
        <input id="pwInput" type="password" class="pw-input" placeholder="••••" maxlength="20"
          onkeydown="if(event.key==='Enter')tryLogin()"/>
        <button class="pw-btn" onclick="tryLogin()">Entrar</button>
      </div>
      <div id="pwError" class="pw-error"></div>
    </div>`;
  } else {
    if(privateApps.length===0){
      privSec.innerHTML=`<div style="padding:16px 0;font-size:13px;color:var(--text3)">Todos os apps estão na seção pública. Use o 🔒 nos cards para mover.</div>`;
    } else {
      privSec.innerHTML=`<div class="cards-grid">${privateApps.map(a=>buildCard(a,true)).join('')}</div>`;
    }
  }
}

// ================================================================
// INIT
// ================================================================
loadLocks();
applyDark();
render();

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const inp=document.getElementById('pwInput');
    if(inp)inp.value='';
  }
});

console.info('[Beza Hub] ✅ Pronto');
</script>
</body>
</html>
